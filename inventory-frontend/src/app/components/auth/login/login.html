<!-- g-0 removes the gap between the blue box and the form -->
<div class="row g-0 vh-100">
  
  <!-- 1. The Baby Blue Area (Left Side - Remaining Width) -->
  <div class="col d-none d-md-block" style="background-color: #F0FFFF;">
    <!-- Empty space -->
  </div>

  <!-- 2. The Login Form (Right Side - Small Width) -->
  <!-- col-md-4 makes it the small width you requested -->
  <div class="col-md-4 bg-white d-flex align-items-center shadow-lg">
    <div class="p-5 w-100">
      <h2>Welcome ✋</h2>
      <p style="color: gray;">please login here</p>
      
      <form (ngSubmit)="login()">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" [(ngModel)]="credentials.username" name="username" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" [(ngModel)]="credentials.password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
        <p class="text-danger mt-2">{{ errorMessage }}</p>
      </form>
      
      <p class="mt-3">Don't have an account? <a routerLink="/register">Register</a></p>
    </div>
  </div>
  
</div>
