<div class="cart-container">
  <h2>
    <i class="bi bi-cart me-2"></i>
    Shopping Cart
  </h2>
  
  <div *ngIf="(cart$ | async) as cart">
    <!-- Empty Cart -->
    <div *ngIf="cart.items.length === 0" class="empty-cart">
      <i class="bi bi-cart-x"></i>
      <p>Your cart is empty</p>
      <p class="text-muted">Looks like you haven't added any items yet</p>
      <button class="shop-now-btn" routerLink="/products">
        <i class="bi bi-shop me-2"></i>Shop Now
      </button>
    </div>
    
    <!-- Cart Items -->
    <div *ngIf="cart.items.length > 0">
      <div *ngFor="let item of cart.items" class="cart-item">
        <img [src]="item.product.imageUrl || 'https://placehold.co/100x100?text=No+Image'" 
             [alt]="item.product.name">
        <div class="cart-item-details">
          <div class="cart-item-name">{{ item.product.name }}</div>
          <div class="cart-item-price">\${{ item.product.price }}</div>
          <div class="item-subtotal">
            Subtotal: <strong>\${{ item.product.price * item.quantity }}</strong>
          </div>
        </div>
        <div class="cart-item-actions">
          <div class="quantity-controls">
            <button (click)="updateQuantity(item.product.id!, item.quantity - 1, item.quantity)" 
                    [disabled]="item.quantity <= 1">
              <i class="bi bi-dash"></i>
            </button>
            <span class="quantity-display">{{ item.quantity }}</span>
            <button (click)="updateQuantity(item.product.id!, item.quantity + 1, item.quantity)"
                    [disabled]="item.quantity >= item.product.quantity">
              <i class="bi bi-plus"></i>
            </button>
          </div>
          <button class="remove-btn" (click)="removeFromCart(item.product.id!)">
            <i class="bi bi-trash"></i> Remove
          </button>
        </div>
      </div>
      
      <!-- Cart Summary -->
      <div class="cart-summary">
        <div class="cart-total">
          Total: <span>\${{ getTotal(cart) }}</span>
        </div>
        <button class="checkout-btn" (click)="checkout()">
          <i class="bi bi-credit-card me-2"></i>Proceed to Checkout
        </button>
      </div>
    </div>
  </div>
</div>
