<div class="row g-0 vh-100">
  
  <!-- Left Side: Empty Space with your specific Baby Blue #F0FFFF -->
  <div class="col d-none d-md-block" style="background-color: #F0FFFF;"></div>

  <!-- Right Side: Scrollable Order History Panel -->
  <div class="col-md-6 bg-white shadow-lg overflow-y-auto" style="max-height: 100vh;">
    <div class="p-5">
      
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h2 class="mb-1">Order History 📦</h2>
          <p class="text-muted small">Review the past purchases</p>
        </div>
        <button class="btn btn-outline-secondary btn-sm" (click)="goBack()">
          ← Back to Products
        </button>
      </div>

      <!-- Empty State -->
      <div *ngIf="orders.length === 0" class="text-center py-5">
        <h4 class="text-muted">No orders found.</h4>
        <p>Your shopping journey starts here!</p>
      </div>

      <!-- Order Cards -->
      <div *ngFor="let order of orders" class="card mb-4 border-0 bg-light shadow-sm">
        <div class="card-header bg-white border-bottom-0 d-flex justify-content-between align-items-center pt-3">
          <span class="badge bg-primary">Order #{{ order.id }}</span>
          <small class="text-muted">{{ order.createdAt | date:'mediumDate' }}</small>
        </div>
        
        <div class="card-body">
          <ul class="list-group list-group-flush mb-3">
            <li *ngFor="let item of order.items" class="list-group-item bg-transparent d-flex justify-content-between align-items-center px-0">
              <div>
                <div class="fw-bold">{{ item.productName }}</div>
                <small class="text-muted">Qty: {{ item.quantity }}</small>
              </div>
              <span class="fw-bold">${{ item.price * item.quantity }}</span>
            </li>
          </ul>
          
          <div class="d-flex justify-content-between align-items-center pt-2 border-top">
            <span class="h6 mb-0">Total Amount</span>
            <span class="h5 mb-0 text-primary fw-bold">${{ getOrderTotal(order) }}</span>
          </div>
        </div>
      </div>

    </div>
  </div>

</div>
