<!-- src/app/product-list/product-list.html -->
<h2>Product List</h2>
<div class="mb-3">
  <input type="text" class="form-control" [(ngModel)]="search" placeholder="Search products" (input)="onSearch()">
</div>
<div class="row">
  <div class="col-md-4" *ngFor="let product of products">
    <div class="card">
      <!-- Product Image - Using placehold.co instead of via.placeholder.com -->
      <!-- src/app/product-list/product-list.html - ONLY CHANGE THE PLACEHOLDER URL -->
<img 
  [src]="product.imageUrl || 'https://placehold.co/300x200?text=No+Image'" 
  [alt]="product.name"
  class="product-image"
>
<!-- Changed from via.placeholder.com to placehold.co -->
      <div class="card-body">
        <h5>{{ product.name }}</h5>
        <p>{{ product.description }}</p>
        <p class="text-success fw-bold">\${{ product.price }}</p>
        <p>Quantity: {{ product.quantity }}</p>
        <button class="btn btn-success" (click)="addToCart(product)">Add to Cart</button>
        <button *ngIf="authService.isAdmin()" class="btn btn-warning ms-2" [routerLink]="['/products/edit', product.id!]">Edit</button>
        <button *ngIf="authService.isAdmin()" class="btn btn-danger ms-2" (click)="deleteProduct(product.id!)">Delete</button>
      </div>
    </div>
  </div>
</div>
<div class="mt-3">
  <button class="btn btn-secondary" (click)="prevPage()" [disabled]="page === 0">Previous</button>
  <button *ngIf="!authService.isAdmin()" class="btn btn-primary" (click)="goToCheckout()" [disabled]="!cartHasItems">Go to Checkout</button>
</div>
